name: Add investor to dashboard

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Investor name (e.g., Sunil Singhania)"
        required: true
        type: string
      fund:
        description: "Fund / firm name (e.g., Abakkus Fund)"
        required: true
        type: string
      url:
        description: "Source URL (e.g., https://ticker.finology.in/investor/...)"
        required: true
        type: string
      style:
        description: "Investor style (optional, e.g., Mid-cap quality growth)"
        required: false
        type: string
        default: "Diversified equity"
      active_since:
        description: "Active since year (optional)"
        required: false
        type: string
        default: "—"
      type:
        description: "Investor type (Individual / HUF / Fund / Family Office)"
        required: false
        type: string
        default: "Individual"

permissions:
  contents: write
  pull-requests: write

jobs:
  add-investor:
    runs-on: ubuntu-latest
    env:
      INV_NAME: ${{ inputs.name }}
      INV_FUND: ${{ inputs.fund }}
      INV_URL: ${{ inputs.url }}
      INV_STYLE: ${{ inputs.style }}
      INV_ACTIVE_SINCE: ${{ inputs.active_since }}
      INV_TYPE: ${{ inputs.type }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run inserter
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          node scripts/add-investor.mjs \
            --name "$INV_NAME" \
            --fund "$INV_FUND" \
            --url "$INV_URL" \
            --style "$INV_STYLE" \
            --active-since "$INV_ACTIVE_SINCE" \
            --type "$INV_TYPE"

      - name: Verify script.js still parses
        run: node --check script.js

      - name: Commit and push
        id: push
        run: |
          slug=$(printf '%s' "$INV_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '-' | sed 's/-\+/-/g; s/^-//; s/-$//')
          branch="add-investor/$slug"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add script.js scripts/sectors.json
          git commit -m "Add $INV_NAME ($INV_FUND) to investor dashboard"
          git push -u origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.push.outputs.branch }}
          BASE: ${{ github.ref_name }}
        run: |
          body=$(cat <<EOF
          Auto-generated by add-investor workflow.

          - **Source**: $INV_URL
          - **Investor**: $INV_NAME
          - **Fund**: $INV_FUND

          Review the diff before merging — sector defaults to "Other" for any company not in \`scripts/sectors.json\`.
          EOF
          )
          gh pr create \
            --title "Add $INV_NAME ($INV_FUND)" \
            --body "$body" \
            --base "$BASE" \
            --head "$BRANCH"

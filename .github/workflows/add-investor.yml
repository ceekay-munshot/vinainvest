name: Add investor to dashboard

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Investor name (e.g., Sunil Singhania)"
        required: true
        type: string
      fund:
        description: "Fund / firm name (e.g., Abakkus Fund)"
        required: true
        type: string
      url:
        description: "Source URL (e.g., https://ticker.finology.in/investor/...)"
        required: true
        type: string
      style:
        description: "Investor style (optional, e.g., Mid-cap quality growth)"
        required: false
        type: string
        default: "Diversified equity"
      active_since:
        description: "Active since year (optional)"
        required: false
        type: string
        default: "—"
      type:
        description: "Investor type (Individual / HUF / Fund / Family Office)"
        required: false
        type: string
        default: "Individual"

permissions:
  contents: write

jobs:
  add-investor:
    runs-on: ubuntu-latest
    env:
      INV_NAME: ${{ inputs.name }}
      INV_FUND: ${{ inputs.fund }}
      INV_URL: ${{ inputs.url }}
      INV_STYLE: ${{ inputs.style }}
      INV_ACTIVE_SINCE: ${{ inputs.active_since }}
      INV_TYPE: ${{ inputs.type }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run inserter
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          node scripts/add-investor.mjs \
            --name "$INV_NAME" \
            --fund "$INV_FUND" \
            --url "$INV_URL" \
            --style "$INV_STYLE" \
            --active-since "$INV_ACTIVE_SINCE" \
            --type "$INV_TYPE"

      - name: Verify script.js still parses
        run: node --check script.js

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add script.js scripts/sectors.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add $INV_NAME ($INV_FUND) to investor dashboard"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep $((attempt * 2))
          done
          echo "Failed to push after 3 attempts."
          exit 1

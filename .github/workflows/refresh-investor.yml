name: Refresh investor data

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Investor slug (lowercase letters, digits, hyphens)"
        required: true
        type: string
      url:
        description: "Source URL to re-scrape"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: refresh-${{ inputs.slug }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      INV_SLUG: ${{ inputs.slug }}
      INV_URL: ${{ inputs.url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scraper
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          node scripts/refresh-investor.mjs --slug "$INV_SLUG" --url "$INV_URL"

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "data/investors/${INV_SLUG}.json" scripts/sectors.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Refresh ${INV_SLUG} from ${INV_URL}"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying..."
            sleep $((attempt * 2))
          done
          echo "Failed to push after 3 attempts."
          exit 1
